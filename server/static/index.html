<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f1eee6">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>StickySync</title>
<style>
  :root{ --bg:#f1eee6; --ink:#222; --muted:#777; --line:#e3ddcf; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); background:var(--bg); overscroll-behavior:none; user-select:none; -webkit-user-select:none; }
  input,textarea{ user-select:text; -webkit-user-select:text; }

  #topbar{ position:fixed; top:0; left:0; right:0; height:52px; padding:0 12px calc(0px + env(safe-area-inset-top)); display:flex; align-items:center; gap:8px; background:rgba(241,238,230,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:20; }
  #topbar h1{ font-size:17px; font-weight:600; margin:0; flex:1; }
  .tbtn{ background:#fff; border:1px solid var(--line); border-radius:9px; height:34px; min-width:34px; padding:0 10px; font-size:15px; color:#333; display:inline-flex; align-items:center; justify-content:center; }
  .tbtn.dark{ background:#2b2b2b; color:#fff; border:none; font-weight:500; }
  #zoomlbl{ font-size:13px; color:var(--muted); min-width:42px; text-align:center; }
  .link{ background:none; border:none; color:var(--muted); font-size:14px; }

  #canvas{ position:fixed; top:52px; left:0; right:0; bottom:0; overflow:hidden; touch-action:none; cursor:grab;
    background-image:radial-gradient(circle, rgba(0,0,0,.10) 1.2px, transparent 1.2px); background-size:26px 26px; background-position:0 0; }
  #canvas.grabbing{ cursor:grabbing; }
  #world{ position:absolute; top:0; left:0; transform-origin:0 0; }

  .card{ position:absolute; background:#fff; border-radius:14px; border:.5px solid rgba(0,0,0,.10); box-shadow:0 4px 16px rgba(0,0,0,.13); display:flex; flex-direction:column; overflow:hidden; }
  .card-head{ height:30px; flex:none; display:flex; align-items:center; padding:0 6px 0 11px; cursor:grab; gap:6px; }
  .card-head .ti{ flex:1; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-head .x{ width:22px; height:22px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:13px; opacity:.6; }
  .card-body{ flex:1; padding:8px 12px; font-size:14px; line-height:1.45; overflow:auto; white-space:pre-wrap; word-break:break-word; color:#33312b; }
  .rz{ position:absolute; right:0; bottom:0; width:22px; height:22px; cursor:nwse-resize; touch-action:none;
    background:linear-gradient(135deg, transparent 50%, rgba(0,0,0,.22) 50%, rgba(0,0,0,.22) 60%, transparent 60%, transparent 72%, rgba(0,0,0,.22) 72%, rgba(0,0,0,.22) 82%, transparent 82%); border-bottom-right-radius:14px; }
  .chk{ display:flex; align-items:flex-start; gap:7px; margin:2px 0; }
  .chk input{ width:17px; height:17px; margin:2px 0 0; flex:none; }
  .chk .done{ text-decoration:line-through; opacity:.55; }
  .bul{ padding-left:15px; position:relative; }
  .bul:before{ content:"•"; position:absolute; left:2px; }
  .ph{ color:var(--muted); }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:flex-end; justify-content:center; z-index:30; }
  .overlay.on{ display:flex; }
  .sheet{ background:#fff; width:100%; max-width:560px; border-radius:16px 16px 0 0; padding:16px 16px calc(16px + env(safe-area-inset-bottom)); }
  .sheet input,.sheet textarea{ width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; font:inherit; font-size:16px; background:#fff; color:#222; }
  .sheet textarea{ min-height:130px; resize:vertical; margin-top:10px; }
  .colors{ display:flex; gap:11px; margin:12px 0; }
  .dot{ width:28px; height:28px; border-radius:50%; border:2px solid transparent; }
  .dot.sel{ border-color:#555; }
  .row{ display:flex; align-items:center; gap:10px; justify-content:flex-end; }
  .btn{ background:#2b2b2b; color:#fff; border:none; border-radius:10px; padding:10px 16px; font-size:15px; font-weight:500; }
  .btn.ghost{ background:#eee; color:#333; }
  .btn.danger{ background:#f3dede; color:#a12; margin-right:auto; }

  .login{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px; text-align:center; }
  .login h1{ margin:0 0 4px; } .login p{ color:var(--muted); margin:0 0 14px; }
  .login input{ width:100%; max-width:320px; font-size:17px; padding:12px; border:1px solid var(--line); border-radius:10px; margin-bottom:12px; }
  .err{ color:#c0392b; font-size:14px; min-height:18px; }
</style>
</head>
<body>

<div id="loginView" class="login" style="display:none">
  <h1>StickySync</h1>
  <p id="t_enterpw"></p>
  <input id="pw" type="password" autocomplete="current-password">
  <div class="err" id="loginErr"></div>
  <button class="btn" id="t_signin" style="width:100%;max-width:320px" onclick="doLogin()"></button>
</div>

<div id="appView" style="display:none">
  <div id="topbar">
    <h1 id="t_title"></h1>
    <button class="tbtn" onclick="zoomStep(0.8)">−</button>
    <span id="zoomlbl">100%</span>
    <button class="tbtn" onclick="zoomStep(1.25)">+</button>
    <button class="tbtn" id="t_reset" title="reset" onclick="resetView()">⤢</button>
    <button class="tbtn dark" id="t_add" onclick="addNote()"></button>
    <button class="link" id="t_logout" onclick="logout()"></button>
  </div>
  <div id="canvas"><div id="world"></div></div>
</div>

<div class="overlay" id="editOverlay">
  <div class="sheet">
    <input id="editTitle">
    <textarea id="editText"></textarea>
    <div class="colors" id="editColors"></div>
    <div class="row">
      <button class="btn danger" id="t_del" onclick="delCurrent()"></button>
      <button class="btn ghost" id="t_cancel" onclick="closeEdit()"></button>
      <button class="btn" id="t_save" onclick="saveEdit()"></button>
    </div>
  </div>
</div>

<script>
const STR = {
  ru:{title:"Мои стикеры",logout:"Выйти",add:"+ Стикер",save:"Сохранить",cancel:"Отмена",del:"Удалить",
      titlePh:"Заголовок (необязательно)",textPh:"Текст заметки…",enterPw:"Введите пароль",signin:"Войти",
      wrongPw:"Неверный пароль",connErr:"Ошибка соединения"},
  en:{title:"My notes",logout:"Sign out",add:"+ Note",save:"Save",cancel:"Cancel",del:"Delete",
      titlePh:"Title (optional)",textPh:"Note text…",enterPw:"Enter password",signin:"Sign in",
      wrongPw:"Wrong password",connErr:"Connection error"}
};
const L = (navigator.language||"en").toLowerCase().startsWith("ru") ? STR.ru : STR.en;
const COLORS = {
  yellow:{bg:"#F5EAA6",ink:"#6b5c12"}, pink:{bg:"#F4CDD8",ink:"#7c3050"},
  blue:{bg:"#CFE0F2",ink:"#2c4f70"}, green:{bg:"#D2E8C6",ink:"#3a6630"},
  purple:{bg:"#DCD0EE",ink:"#4b3c79"}, orange:{bg:"#F5D9BB",ink:"#8a5520"}
};
function tset(id,prop,val){ const e=document.getElementById(id); if(e){ if(prop==="ph") e.placeholder=val; else e.textContent=val; } }
tset("t_enterpw","tx",L.enterPw); tset("t_signin","tx",L.signin); tset("t_title","tx",L.title);
tset("t_add","tx",L.add); tset("t_logout","tx",L.logout); tset("t_del","tx",L.del);
tset("t_cancel","tx",L.cancel); tset("t_save","tx",L.save);
document.getElementById("editTitle").placeholder=L.titlePh;
document.getElementById("editText").placeholder=L.textPh;

let token = localStorage.getItem("stk_token") || "";
let notes = [];
let byId = {};
let pan = {x:0,y:0}, zoom = 1, viewInit = false;
const canvas = document.getElementById("canvas");
const world = document.getElementById("world");
let editId = null, editColor = "yellow";

try{ const v=JSON.parse(localStorage.getItem("stk_view")||"null"); if(v){ pan=v.pan; zoom=v.zoom; viewInit=true; } }catch(e){}

function show(v){ document.getElementById("loginView").style.display=v==="login"?"flex":"none";
  document.getElementById("appView").style.display=v==="app"?"block":"none"; }
async function api(method,path,body){
  const r = await fetch(path,{method,headers:Object.assign({"Content-Type":"application/json"}, token?{"Authorization":"Bearer "+token}:{}), body:body?JSON.stringify(body):undefined});
  if(r.status===401){ token=""; localStorage.removeItem("stk_token"); show("login"); throw new Error("401"); }
  if(!r.ok) throw new Error("http "+r.status);
  return r.status===204?null:r.json();
}
async function doLogin(){
  const pw=document.getElementById("pw").value; document.getElementById("loginErr").textContent="";
  try{
    const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    if(!r.ok){ document.getElementById("loginErr").textContent=L.wrongPw; return; }
    token=(await r.json()).token; localStorage.setItem("stk_token",token); start();
  }catch(e){ document.getElementById("loginErr").textContent=L.connErr; }
}
function logout(){ token=""; localStorage.removeItem("stk_token"); show("login"); }

function applyTransform(){
  const px=Math.round(pan.x), py=Math.round(pan.y);
  world.style.transform = (Math.abs(zoom-1)<0.001)
    ? `translate(${px}px,${py}px)`
    : `translate(${px}px,${py}px) scale(${zoom})`;
  canvas.style.backgroundSize=`${26*zoom}px ${26*zoom}px`;
  canvas.style.backgroundPosition=`${px}px ${py}px`;
  document.getElementById("zoomlbl").textContent=Math.round(zoom*100)+"%";
}
function saveView(){ localStorage.setItem("stk_view",JSON.stringify({pan,zoom})); }
function zoomAround(factor,cx,cy){
  const nz=Math.min(3,Math.max(0.25,zoom*factor)); const wx=(cx-pan.x)/zoom, wy=(cy-pan.y)/zoom;
  zoom=nz; pan.x=cx-wx*zoom; pan.y=cy-wy*zoom; applyTransform(); saveView();
}
function zoomStep(f){ const r=canvas.getBoundingClientRect(); zoomAround(f, r.width/2, r.height/2); }
function resetView(){ zoom=1; centerOnNotes(true); }
function centerOnNotes(force){
  if(!notes.length){ pan={x:40,y:40}; applyTransform(); return; }
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const n of notes){ minX=Math.min(minX,n.x); minY=Math.min(minY,n.y); maxX=Math.max(maxX,n.x+(n.w||240)); maxY=Math.max(maxY,n.y+(n.h||210)); }
  const r=canvas.getBoundingClientRect(); const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  pan.x=r.width/2-cx*zoom; pan.y=r.height/2-cy*zoom; applyTransform(); saveView();
}

function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtTime(ts){ const d=new Date(ts*1000),p=x=>String(x).padStart(2,'0'); return p(d.getDate())+"."+p(d.getMonth()+1)+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function bodyHtml(n){
  const lines=(n.text||"").split("\n"); let h="";
  const meta=[]; if(n.locked) meta.push("🔒"); if(n.alarm&&n.alarm>0) meta.push("⏰ "+fmtTime(n.alarm));
  if(meta.length) h+=`<div class="ph" style="font-size:12px;margin-bottom:4px">${meta.join("&nbsp;&nbsp;")}</div>`;
  if(!n.text){ return h+`<span class="ph">${esc(L.textPh)}</span>`; }
  for(let i=0;i<lines.length;i++){
    const cm=lines[i].match(/^(\s*)\[([ xX])\]\s(.*)$/);
    if(cm){ const ck=cm[2].toLowerCase()==="x";
      h+=`<label class="chk"><input type="checkbox" data-i="${i}" ${ck?"checked":""}><span class="${ck?'done':''}">${esc(cm[3])||"&nbsp;"}</span></label>`; continue; }
    const bm=lines[i].match(/^(\s*)[-•]\s(.*)$/);
    if(bm){ h+=`<div class="bul">${esc(bm[2])||"&nbsp;"}</div>`; continue; }
    h+=`<div>${esc(lines[i])||"&nbsp;"}</div>`;
  }
  return h;
}
function makeCard(n){
  const c=COLORS[n.color]||COLORS.yellow;
  const el=document.createElement("div"); el.className="card"; el.dataset.id=n.id;
  el.style.left=n.x+"px"; el.style.top=n.y+"px"; el.style.width=(n.w||240)+"px"; el.style.height=(n.h||210)+"px";
  el.innerHTML=`<div class="card-head" style="background:${c.bar||c.bg}"><span class="ti" style="color:${c.ink}">${esc(n.title||"")}</span><span class="x" style="color:${c.ink}" data-act="del">✕</span></div>`
    +`<div class="card-body">${bodyHtml(n)}</div><div class="rz"></div>`;
  el.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    cb.addEventListener("change",ev=>{ ev.stopPropagation(); toggleCheck(n,parseInt(cb.dataset.i,10)); });
    cb.addEventListener("pointerdown",ev=>ev.stopPropagation());
  });
  return el;
}
function render(){
  if(interacting()) return;
  world.innerHTML="";
  byId={};
  for(const n of notes){ const el=makeCard(n); byId[n.id]=el; world.appendChild(el); }
}
function updateCardEl(n){ const el=byId[n.id]; if(!el) return;
  el.style.left=n.x+"px"; el.style.top=n.y+"px"; el.style.width=n.w+"px"; el.style.height=n.h+"px"; }

const pointers=new Map();
let g=null;
function interacting(){ return g!==null || document.getElementById("editOverlay").classList.contains("on"); }
function noteFromEl(el){ return byId && el ? notes.find(n=>String(n.id)===el.dataset.id) : null; }

canvas.addEventListener("pointerdown",e=>{
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ startPinch(); return; }
  if(e.target.tagName==="INPUT") return;
  canvas.setPointerCapture(e.pointerId);
  const cardEl=e.target.closest(".card");
  if(e.target.classList.contains("rz")){ const n=noteFromEl(cardEl); g={mode:"resize",n,sx:e.clientX,sy:e.clientY,w:n.w||240,h:n.h||210}; }
  else if(cardEl){ const n=noteFromEl(cardEl); g={mode:"card",n,el:cardEl,sx:e.clientX,sy:e.clientY,x:n.x,y:n.y,moved:false,
      del:e.target.dataset.act==="del"}; cardEl.style.zIndex=Date.now()%100000; }
  else { canvas.classList.add("grabbing"); g={mode:"pan",sx:e.clientX,sy:e.clientY,px:pan.x,py:pan.y}; }
});
canvas.addEventListener("pointermove",e=>{
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(g&&g.mode==="pinch"){ doPinch(); return; }
  if(!g) return;
  const dx=e.clientX-g.sx, dy=e.clientY-g.sy;
  if(g.mode==="pan"){ pan.x=g.px+dx; pan.y=g.py+dy; applyTransform(); }
  else if(g.mode==="card"){ if(Math.hypot(dx,dy)>5) g.moved=true;
    if(g.moved){ g.n.x=Math.round(g.x+dx/zoom); g.n.y=Math.round(g.y+dy/zoom); updateCardEl(g.n); } }
  else if(g.mode==="resize"){ g.n.w=Math.round(Math.max(150,g.w+dx/zoom)); g.n.h=Math.round(Math.max(90,g.h+dy/zoom)); updateCardEl(g.n); }
});
function endPointer(e){
  pointers.delete(e.pointerId); canvas.classList.remove("grabbing");
  if(g&&g.mode==="pinch"){ if(pointers.size<2){ g=null; } return; }
  if(!g) return;
  if(g.mode==="pan"){ saveView(); }
  else if(g.mode==="resize"){ api("PUT","/api/notes/"+g.n.id,{w:g.n.w,h:g.n.h}).catch(()=>{}); }
  else if(g.mode==="card"){
    if(g.moved){ api("PUT","/api/notes/"+g.n.id,{x:g.n.x,y:g.n.y}).catch(()=>{}); }
    else if(g.del){ delNote(g.n.id); }
    else { openEdit(g.n); }
  }
  g=null;
}
canvas.addEventListener("pointerup",endPointer);
canvas.addEventListener("pointercancel",endPointer);
canvas.addEventListener("wheel",e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect();
  zoomAround(e.deltaY<0?1.12:0.89, e.clientX-r.left, e.clientY-r.top); }, {passive:false});

let pinch=null;
function twoPts(){ const a=[...pointers.values()]; return a.slice(0,2); }
function startPinch(){ const p=twoPts(); const r=canvas.getBoundingClientRect();
  const mid={x:(p[0].x+p[1].x)/2-r.left, y:(p[0].y+p[1].y)/2-r.top};
  pinch={dist:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y), mid}; g={mode:"pinch"}; }
function doPinch(){ const p=twoPts(); if(p.length<2) return; const r=canvas.getBoundingClientRect();
  const dist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
  const mid={x:(p[0].x+p[1].x)/2-r.left, y:(p[0].y+p[1].y)/2-r.top};
  pan.x+=mid.x-pinch.mid.x; pan.y+=mid.y-pinch.mid.y;
  zoomAround(dist/pinch.dist, mid.x, mid.y);
  pinch.dist=dist; pinch.mid=mid;
}

async function toggleCheck(n,i){
  const lines=(n.text||"").split("\n");
  lines[i]=lines[i].replace(/^(\s*)\[([ xX])\]\s/,(m,sp,st)=>sp+"["+(st===" "?"x":" ")+"] ");
  n.text=lines.join("\n");
  try{ await api("PUT","/api/notes/"+n.id,{text:n.text}); }catch(e){}
}
function openEdit(n){ editId=n.id; editColor=n.color;
  document.getElementById("editTitle").value=n.title||"";
  document.getElementById("editText").value=n.text||"";
  colorDots(); document.getElementById("editOverlay").classList.add("on"); }
function closeEdit(){ document.getElementById("editOverlay").classList.remove("on"); editId=null; load(); }
function colorDots(){ const c=document.getElementById("editColors"); c.innerHTML="";
  for(const name in COLORS){ const d=document.createElement("div"); d.className="dot"+(editColor===name?" sel":"");
    d.style.background=COLORS[name].bg; d.onclick=()=>{ editColor=name; colorDots(); }; c.appendChild(d); } }
async function saveEdit(){
  await api("PUT","/api/notes/"+editId,{text:document.getElementById("editText").value,
    title:document.getElementById("editTitle").value, color:editColor});
  closeEdit();
}
async function delCurrent(){ const id=editId; document.getElementById("editOverlay").classList.remove("on"); editId=null; await delNote(id); }
async function delNote(id){ try{ await api("DELETE","/api/notes/"+id);}catch(e){} load(); }
async function addNote(){
  const r=canvas.getBoundingClientRect();
  const x=Math.round((r.width/2-pan.x)/zoom-120), y=Math.round((r.height/2-pan.y)/zoom-90);
  try{ await api("POST","/api/notes",{text:"",color:"yellow",x,y,w:240,h:200}); }catch(e){}
  await load();
  const fresh=notes[notes.length-1]; if(fresh) openEdit(fresh);
}
async function load(){
  try{
    const data=await api("GET","/api/notes");
    notes=data; if(interacting()&&g) return;
    render();
    if(!viewInit){ viewInit=true; centerOnNotes(); }
  }catch(e){}
}
function start(){ show("app"); applyTransform(); load(); setInterval(load,5000); }
if(token){ start(); } else { show("login"); }
</script>
</body>
</html>
